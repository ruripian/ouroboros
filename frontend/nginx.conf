server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # 해시된 에셋 — Vite 는 /assets/*.[hash].js|css 로 출력.
    # 파일명 자체가 바뀌므로 안전하게 영구 캐시 가능.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html — 절대 캐시 금지. 새 배포 즉시 반영 (사용자 새로고침 없이 다음 네비게이션부터 구 해시 JS 가 아닌 새 해시 JS 로딩).
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }

    # SPA 라우팅 — 존재하지 않는 경로는 index.html 로 폴백.
    # 폴백 응답도 no-store 로 내려야 주소창으로 직접 들어온 사용자도 구버전에 고착되지 않음.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires -1;
    }
}
