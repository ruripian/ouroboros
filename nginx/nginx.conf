# 확장자별 Content-Disposition — 이미지/비디오/PDF는 inline, 그 외(html/svg 등 XSS 위험)는 attachment
map $uri $media_disposition {
    default                                          "attachment";
    "~*\.(png|jpe?g|gif|webp|avif|mp4|webm|mov|pdf)$" "inline";
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Docker 내장 DNS (127.0.0.11) 사용 + 10초마다 재해석
    # upstream 블록 대신 변수와 함께 쓰면 매 요청마다 DNS 재조회 → 컨테이너 IP 변경 대응
    # Docker 내장 DNS — valid=1s 로 컨테이너 recreate 시 502 최소화.
    # upstream 블록 대신 `set $var` + 변수 proxy_pass 조합으로 매 요청 DNS 조회.
    resolver 127.0.0.11 valid=1s ipv6=off;

    # --- HTTPS 리다이렉트 (인증서 설정 후 활성화) ---
    # return 301 https://$host$request_uri;

    # ===== 보안 헤더 =====
    # XSS 방어: 브라우저 내장 XSS 필터 활성화
    add_header X-XSS-Protection "1; mode=block" always;
    # MIME 스니핑 차단: Content-Type 헤더를 신뢰하도록 강제
    add_header X-Content-Type-Options "nosniff" always;
    # 클릭재킹 방어: iframe 삽입 차단
    add_header X-Frame-Options "DENY" always;
    # Referrer 정보 제한: 외부 사이트에는 origin만 전송
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 권한 정책: 불필요한 브라우저 기능 차단
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- API 프록시 ---
    location /api/ {
        # 허용 메소드 제한 (CK01/CF01: 불필요 메소드 비활성화)
        limit_except GET POST PUT PATCH DELETE OPTIONS {
            deny all;
        }
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 백엔드 재기동 구간(수 초)에 502/504 대신 JSON 503 반환 → 프론트가 그대로 재시도
        proxy_connect_timeout 3s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        error_page 502 503 504 = @api_unavailable;
    }

    location @api_unavailable {
        default_type application/json;
        add_header Retry-After 2 always;
        return 503 '{"detail":"서비스가 일시적으로 재기동 중입니다. 잠시 후 다시 시도하세요."}';
    }

    # --- WebSocket 프록시 ---
    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Django Admin (접근 제한 권장) ---
    location /admin/ {
        # 프로덕션 배포 시 IP 제한 활성화 권장:
        # allow 10.0.0.0/8;
        # deny all;
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 정적 파일 ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- 미디어 파일 (업로드된 첨부파일) ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        # 이미지/비디오/PDF는 inline 렌더, 그 외(html/svg 등 XSS 위험)는 다운로드 강제
        add_header Content-Disposition $media_disposition always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- 프론트엔드 SPA ---
    location / {
        set $frontend_upstream frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 3s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        error_page 502 503 504 = @frontend_retry;
    }

    # 프론트 재기동 구간 — Bad Gateway 대신 자동 새로고침 안내 페이지
    location @frontend_retry {
        default_type text/html;
        add_header Retry-After 2 always;
        return 503 '<!doctype html><html lang="ko"><head><meta charset="utf-8"><title>Reconnecting…</title><meta http-equiv="refresh" content="2"><style>html,body{height:100%;margin:0;font:14px system-ui,sans-serif;color:#333;background:#fafafa;display:flex;align-items:center;justify-content:center}div{text-align:center}.s{display:inline-block;width:18px;height:18px;border:2px solid #ccc;border-top-color:#555;border-radius:50%;animation:r 1s linear infinite;vertical-align:middle;margin-right:8px}@keyframes r{to{transform:rotate(360deg)}}</style></head><body><div><span class="s"></span>서비스 재기동 중… 잠시 후 자동으로 새로고침됩니다.</div></body></html>';
    }
}

