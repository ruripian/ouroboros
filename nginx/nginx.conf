server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Docker 내장 DNS (127.0.0.11) 사용 + 10초마다 재해석
    # upstream 블록 대신 변수와 함께 쓰면 매 요청마다 DNS 재조회 → 컨테이너 IP 변경 대응
    resolver 127.0.0.11 valid=10s ipv6=off;

    # --- HTTPS 리다이렉트 (인증서 설정 후 활성화) ---
    # return 301 https://$host$request_uri;

    # ===== 보안 헤더 =====
    # XSS 방어: 브라우저 내장 XSS 필터 활성화
    add_header X-XSS-Protection "1; mode=block" always;
    # MIME 스니핑 차단: Content-Type 헤더를 신뢰하도록 강제
    add_header X-Content-Type-Options "nosniff" always;
    # 클릭재킹 방어: iframe 삽입 차단
    add_header X-Frame-Options "DENY" always;
    # Referrer 정보 제한: 외부 사이트에는 origin만 전송
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 권한 정책: 불필요한 브라우저 기능 차단
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # --- API 프록시 ---
    location /api/ {
        # 허용 메소드 제한 (CK01/CF01: 불필요 메소드 비활성화)
        limit_except GET POST PUT PATCH DELETE OPTIONS {
            deny all;
        }
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket 프록시 ---
    location /ws/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- Django Admin (접근 제한 권장) ---
    location /admin/ {
        # 프로덕션 배포 시 IP 제한 활성화 권장:
        # allow 10.0.0.0/8;
        # deny all;
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- 정적 파일 ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- 미디어 파일 (업로드된 첨부파일) ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        # 보안: 미디어 파일을 브라우저에서 직접 실행하지 않도록 다운로드 강제
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- 프론트엔드 SPA ---
    location / {
        set $frontend_upstream frontend:80;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

